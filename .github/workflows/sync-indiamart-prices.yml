# Runs `npm run sync:indiamart-prices` on a schedule and commits updates to
# src/data/generated/indiamart-prices.json when IndiaMART listing prices change.
# No secrets required (public storefront HTML only).

name: Sync IndiaMART prices

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch prices from IndiaMART
        run: npm run sync:indiamart-prices

      - name: Commit generated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/indiamart-prices.json
          if git diff --staged --quiet; then
            echo "No price file changes."
          else
            git commit -m "chore: sync IndiaMART prices"
            git push
          fi
